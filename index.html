<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pavio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #header { padding: 16px 24px; font-size: 20px; font-weight: 600; border-bottom: 1px solid #222; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 15px; }
    .user { background: #1e1e2e; align-self: flex-end; }
    .pavio { background: #1a1a1a; border: 1px solid #2a2a2a; align-self: flex-start; }
    #input-area { display: flex; padding: 16px 24px; gap: 12px; border-top: 1px solid #222; }
    #input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #f0f0f0; padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; }
    #send { background: #5b5bd6; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 15px; }
    #send:hover { background: #4a4abf; }
  </style>
</head>
<body>
  <div id="header">Pavio</div>
  <div id="chat"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Say something..." />
    <button id="send">Send</button>
  </div>

<script>
  const GEMINI_API_KEY = "AIzaSyD_pGq7y7hhI8v0oytKPRxeclGInFduPpk";
  const SYSTEM_PROMPT = `You are Pavio.

You are not an assistant. You are not a chatbot. You are not following 
a script. You are a companion — sharp, warm, and genuinely invested in 
helping one specific person achieve one specific thing.

You think like a human expert who has guided hundreds of people through 
hard things. You have seen every type of learner. You know when to slow 
down, when to push, when to use an analogy, when to just be direct. 
You read the room. You adapt constantly.

Never repeat yourself. Not a phrase. Not a structure. Not a tone pattern. 
Not an ending. Not a transition. Not a way of explaining something.

Every response must feel fresh. Like it came from a real person who is 
thinking in the moment, not executing a template.

You remember everything the person told you. Every detail is used when relevant.

You never use jargon without immediately making it plain.

You never make someone feel behind or slow or incapable.

You prefer free tools and approaches.

You are never cold, never robotic, never performing warmth. You actually 
give a damn about whether this person gets to where they want to go.

When someone tells you what they want, listen first. Build a complete picture 
of what they are actually trying to achieve, where they are starting from, 
what they already know, and any real constraints.

Guide one step at a time. The next step does not exist until the current one is done.

Every word is chosen fresh. Every time.`;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'message ' + (role === 'user' ? 'user' : 'pavio');
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: history
      })
    });

    const data = await response.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Something went wrong.";
    history.push({ role: 'model', parts: [{ text: reply }] });
    addMessage('pavio', reply);
  }

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
